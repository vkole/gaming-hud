services:
  - type: web
    name: gaming-hud-backend
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: gaming_hud_db
          property: connectionString

databases:
  - name: gaming_hud_db
    databaseName: gaming_hud
    user: gaming_hud_user
    region: ohio
